<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Nutricional</title>
</head>
<body>
    
<h1>Cadastro</h1>

 <form action="" id="form-cadastro">
        Nome: <input type="text" id="nome"><br><br>
        Data de Nascimento : <input type="text"><br><br>
        E-mail: <input type="email" id="email"><br><br>
        Telefone: <input type="tel" id="telefone"><br><br>
        Endereço: <input type="endereco"> <br><br>
        Profissão: <input type="profissao"> <br><br>
        Altura: <input type="altura"> <br><br>
        Peso: <input type="peso"> <br><br> 
        <button id="botao"> Cadastrar </button><br><br>
    </form>

    <table border="1px" id="tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Data de Nascimento</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>Profissão</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>IMC</th>
                <th>Ações</th>
            </tr>


        </thead>




    </table>


</body>
</html>
